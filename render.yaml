services:
  - type: web
    name: ai-resume-portfolio-builder
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python backend.py
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: HF_TOKEN
        sync: false
      - key: HF_MODEL
        value: google/gemma-2-2b-it:preferred
